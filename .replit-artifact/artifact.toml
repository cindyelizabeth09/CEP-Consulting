kind = "web"
previewPath = "/"
title = "CEP Consulting Services"
version = "1.0.0"
id = "artifacts/cep-consulting"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23924

[services.development]
run = "pnpm --filter @workspace/cep-consulting run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cep-consulting", "run", "build" ]
publicDir = "artifacts/cep-consulting/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23924"
BASE_PATH = "/"
